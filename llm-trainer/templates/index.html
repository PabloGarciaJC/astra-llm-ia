<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astra LLM AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.4rem;
      color: #64748b;
      font-size: 0.9rem;
    }

    .badge {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.ok  { background: #14532d; color: #4ade80; }
    .badge.err { background: #450a0a; color: #f87171; }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 760px;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }

    .controls {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .control-group { flex: 1; min-width: 120px; }

    input[type="range"] {
      width: 100%;
      accent-color: #7c3aed;
      margin-top: 0.3rem;
    }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #475569;
      margin-top: 0.1rem;
    }

    .range-value {
      font-size: 0.8rem;
      color: #a78bfa;
      font-weight: 600;
    }

    button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    button:hover  { background: #6d28d9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-card { display: none; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .result-header span { font-size: 0.8rem; color: #64748b; }

    #result-text {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e1;
      min-height: 120px;
    }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid #4c1d95;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2rem;
      color: #334155;
      font-size: 0.78rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <h1>Astra LLM AI</h1>
    <p>Transformer entrenado desde cero · by Pablo Garcia JC</p>
    {% if model_ready %}
      <span class="badge ok">Modelo cargado</span>
    {% else %}
      <span class="badge err">Modelo no disponible — ejecuta make train</span>
    {% endif %}
  </header>

  <div class="card">
    <label for="prompt">Prompt</label>
    <textarea id="prompt" placeholder="Escribe un inicio de texto... (vacío para generación libre)"></textarea>

    <div class="controls">
      <div class="control-group">
        <label>Longitud — <span class="range-value" id="val-len">300</span> caracteres</label>
        <input type="range" id="gen-len" min="50" max="800" value="300" step="50"
               oninput="document.getElementById('val-len').textContent = this.value" />
        <div class="range-labels"><span>50</span><span>800</span></div>
      </div>

      <div class="control-group">
        <label>Temperatura — <span class="range-value" id="val-temp">0.8</span></label>
        <input type="range" id="temperature" min="0.1" max="2.0" value="0.8" step="0.1"
               oninput="document.getElementById('val-temp').textContent = parseFloat(this.value).toFixed(1)" />
        <div class="range-labels"><span>0.1 preciso</span><span>2.0 creativo</span></div>
      </div>

      <button id="btn-generate" onclick="generate()" {% if not model_ready %}disabled{% endif %}>
        Generar
        <span class="spinner" id="spinner"></span>
      </button>
    </div>
  </div>

  <div class="card result-card" id="result-card">
    <div class="result-header">
      <label style="margin:0">Texto generado</label>
      <span id="result-meta"></span>
    </div>
    <div id="result-text"></div>
  </div>

  <footer>Astra LLM AI · Transformer desde cero · PyTorch · Docker</footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
        if (regs.length) location.reload();
      });
    }

    async function generate() {
      const btn     = document.getElementById('btn-generate');
      const spinner = document.getElementById('spinner');
      const card    = document.getElementById('result-card');
      const output  = document.getElementById('result-text');
      const meta    = document.getElementById('result-meta');

      const prompt      = document.getElementById('prompt').value;
      const gen_len     = parseInt(document.getElementById('gen-len').value);
      const temperature = parseFloat(document.getElementById('temperature').value);

      btn.disabled    = true;
      spinner.style.display = 'inline-block';
      card.style.display    = 'block';
      output.textContent    = 'Generando...';
      meta.textContent      = '';

      const t0 = Date.now();

      try {
        const res  = await fetch('/generate', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ prompt, gen_len, temperature }),
        });
        const data = await res.json();
        const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

        if (data.error) {
          output.textContent = '❌ ' + data.error;
        } else {
          output.textContent = data.text;
          meta.textContent   = `${data.text.length} caracteres · ${elapsed}s`;
        }
      } catch (e) {
        output.textContent = '❌ Error de conexión con el servidor.';
      }

      btn.disabled          = false;
      spinner.style.display = 'none';
    }

    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) generate();
    });
  </script>

</body>
</html>
